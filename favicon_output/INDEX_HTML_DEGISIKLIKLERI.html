<!--
  ============================================================
  AyakTakip - index.html <head> Favicon Güncellemesi
  ============================================================

  MEVCUT (SİLİNECEK):
  <link rel="icon" type="image/webp" href="/images/app-icon-new.webp"/>
  <link rel="apple-touch-icon" href="/images/app-icon-new.webp"/>

  YENİ (YERİNE EKLENECEK):
-->

<!-- Favicon Seti (Eski webp link'lerini SİLİN ve bunları ekleyin) -->
<link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />

<!--
  ============================================================
  ÖNEMLİ NOTLAR:
  ============================================================

  1. Eski satırı TAMAMEN SİLİN:
     <link rel="icon" type="image/webp" href="/images/app-icon-new.webp"/>
     <link rel="apple-touch-icon" href="/images/app-icon-new.webp"/>

  2. Yukarıdaki 6 satırı <head> içine ekleyin (theme-color'dan sonra ideal).

  3. OG ve Twitter image meta tag'lerinde webp kalabilir (sosyal
     medya webp'yi destekler), ancak isterseniz PNG'ye çevirebilirsiniz:
     <meta property="og:image" content="https://ayaktakip.com/icon-512x512.png"/>
     <meta name="twitter:image" content="https://ayaktakip.com/icon-512x512.png"/>

  4. Schema.org logo'su da güncellenebilir:
     "logo": "https://ayaktakip.com/icon-512x512.png"
  ============================================================
-->
